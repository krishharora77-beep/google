<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in – Google Accounts</title>

<style>
body {
    margin: 0;
    font-family: 'Roboto', Arial, sans-serif;
    background: #fff;
}

.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.card {
    width: 360px;
    border: 1px solid #dadce0;
    border-radius: 8px;
    padding: 40px 30px;
}

/* LOGO */
.logo {
    text-align: center;
    margin-bottom: 20px;
}

.logo img {
    width: 75px;
}

/* HEADING */
h1 {
    font-size: 24px;
    font-weight: 400;
    text-align: center;
    margin-bottom: 10px;
}

.email {
    text-align: center;
    font-size: 14px;
    color: #5f6368;
    margin-bottom: 30px;
}

/* FIELD */
.field {
    position: relative;
    margin-bottom: 25px;
}

.field input {
    width: 100%;
    padding: 16px 10px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    font-size: 16px;
    outline: none;
}

/* FLOAT LABEL */
.field label {
    position: absolute;
    left: 10px;
    top: 16px;
    color: #5f6368;
    font-size: 16px;
    transition: 0.2s;
    background: #fff;
    padding: 0 5px;
}

.field input:focus + label,
.field input:not(:placeholder-shown) + label {
    top: -8px;
    font-size: 12px;
    color: #1a73e8;
}

/* SHOW PASSWORD */
.show {
    font-size: 14px;
    margin-top: -10px;
    margin-bottom: 20px;
}

.actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

button {
    background: #1a73e8;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
}

button:hover {
    background: #1765cc;
}

.link {
    color: #1a73e8;
    font-size: 14px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="card">

        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">
        </div>

        <h1>Welcome</h1>
        <div class="email" id="userEmail">example@gmail.com</div>

        <div class="field">
            <input type="password" id="password" required placeholder=" ">
            <label>Enter your password</label>
        </div>

        <div class="show">
            <input type="checkbox" onclick="toggle()"> Show password
        </div>

        <div class="actions">
            <div class="link">Forgot password?</div>
            <button onclick="submitPass()">Next</button>
        </div>

    </div>
</div>

<script>
// SHOW EMAIL FROM PREVIOUS PAGE
const email = localStorage.getItem("email");
if (email) {
    document.getElementById("userEmail").innerText = email;
}

// TOGGLE PASSWORD
function toggle() {
    const input = document.getElementById("password");
    input.type = input.type === "password" ? "text" : "password";
}

// NEXT BUTTON
function submitPass() {
    const pass = document.getElementById("password").value;

    if (!pass) {
        alert("Enter password!");
        return;
    }

    alert("Login complete 😏");
}
</script>

</body>
</html>
